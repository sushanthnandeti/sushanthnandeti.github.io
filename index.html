<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content = "IE-egde">
  <title>JS Calculator</title>


<style type="text/css">

  input[type="text"] {
    width: 100px;
  }

  body{
            height:2000px;
            width: 1200px;
            margin: 0 auto;
            background-color: #E8EFFA;
        }



  h2{
              font:sans-serif;
              margin: 30px 30px 30px 50px;
              font-size: 38px;
              color: #10419C;
            }
  


  #first-div{ 
              width: 100%;
              height: 70px;
              background-color: rgb(16, 65, 156);
              display: flex;
              align-items: center;
              font-family: Arial, Helvetica, sans-serif;
  }

  #first-div h1 {
              text-align: center;
              color: white;
              margin: 0 auto;
              font-family: Arial, Helvetica, sans-serif;
              font-weight: lighter;
}

  #second-div{ 
              display: flex;
              flex-direction: column;
              justify-content: center;
              width: 500px;
              height: auto;
              padding: 20px;
              border: 5px solid rgb(12, 56, 138);
              border-radius: 5px;
              margin: 0 auto;
              margin-top: 100px;
  }

  button{
              margin-top: 15px;
              height: 40px;
              border: none;
              background-color: rgb(12, 56, 138);
              border-radius: 5px;
              color: white;
 
  }
  
  button:hover {
            cursor: pointer;
            background-color: dodgerblue;
}

  #result{ 
              font-size: 35px;
              color: #0e008b;
              font-family: Arial, sans-serif;
              font-weight: bold;
              padding-top: 30px;
              padding-bottom: 30px;
              margin: 0 auto;
  }
  
 label {
              font-weight: bold;
              color: rgb(10, 10, 95);  
              margin: 4px 0 15px 0;     
              font-family: sans-serif;
              font-size: 20px;
          
    }

    #num2-txt {
              border: 1px solid #ccc;
              padding: 5px;
              width: 50%;
    }

    #num1-txt {
              border: 1px solid #ccc;
              padding: 5px;
              width: 50%;
       
    }
</style>
</head>
<body>

<div id = "main-div">

        <div id="first-div">

              <h1> Javascript Calculator</h1>
       
        </div>

        <div id = "second-div">
            <label for="num1-txt">Enter First Number:</label>
            <input type="text" id="num1-txt" />

            &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 
            
            <select id="operator-select">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
            </select>
            
            &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 
            <label for="num2-txt">Enter Second Number:</label>
            <input type="text" id="num2-txt" />

            <button onclick="calculate()">Calculate</button>

            <p id="result"> </p>
        </div>

</div>
<script type="text/Javascript">

          function calculate() {
          
            let num1 = Number(document.getElementById("num1-txt").value);
            let num2 = Number(document.getElementById("num2-txt").value);
            
            
            let operators = document.getElementById("operator-select").value;
            
            let result;
            
            // Operations based on selection operators

            switch(operators) {
              case "+":
                result = num1 + num2;
                break;
              case "-":
                result = num1 - num2;
                break;
              case "*":
                result = num1 * num2;
                break;
              case "/":
                if(num2 !== 0) {
                  result = num1 / num2;
                } else {
                  result = "Division by zero not possible";
                }
                break;
              default:
                result = "Invalid operator";
            }
            
            document.getElementById("result").innerText = "Result: " + result;
          }
</script>

</body>
</html>
